  contact: {}
paths:
  /telemetry/v1/actions:
    get:
      consumes:
      - application/json
      description: Retrieve actions with optional search. Organization is resolved
        from X-Organization header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Search by name or key
        in: query
        name: search
        type: string
      - description: Number of results per page (default 20)
        in: query
        name: limit
        type: integer
      - description: Number of results to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Space-DF_telemetry-service_internal_api_common.PaginatedResponse'
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get actions
      tags:
      - automations
    post:
      consumes:
      - application/json
      description: Create a new action. Organization is resolved from X-Organization
        header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Action configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Space-DF_telemetry-service_internal_api_automations_models.ActionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create action
      tags:
      - automations
  /telemetry/v1/actions/{action_id}:
    delete:
      consumes:
      - application/json
      description: Delete an action by ID. Organization is resolved from X-Organization
        header or hostname (e.g., {org}.localhost)
