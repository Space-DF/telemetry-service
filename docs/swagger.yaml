      - description: Geofence configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Space-DF_telemetry-service_internal_api_geofences_models.CreateGeofenceRequest'
      produces:
      - application/json
      responses:
        "201":
