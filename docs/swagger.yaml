            additionalProperties:
              type: string
            type: object
      summary: Get entities
      tags:
      - entities
  /telemetry/v1/entities/bulk-update:
    put:
      consumes:
      - application/json
      description: Bulk update entities in the current space. When `all=true`, the
        request applies `is_enabled` to every entity in the space and `excluded_entity_ids`
        receive the opposite value. When `all=false`, only the provided `visible_entity_ids`
        and `hidden_entity_ids` are updated. Organization is resolved from X-Organization
        header or hostname and space is resolved from X-Space.
      parameters:
      - description: Entity updates
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Space-DF_telemetry-service_internal_api_entities_models.UpdateEntityRequest'
