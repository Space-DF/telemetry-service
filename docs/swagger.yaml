        in: path
        name: action_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Action not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete action
      tags:
      - automations
    put:
      consumes:
      - application/json
      description: Update an existing action by ID. Organization is resolved from
        X-Organization header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Action ID
        in: path
        name: action_id
        required: true
        type: string
      - description: Action configuration
        in: body
        name: request
        required: true
