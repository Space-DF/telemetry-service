definitions:
  common.PaginatedResponse:
    properties:
      count:
        type: integer
      next:
        type: string
      previous:
        type: string
      results: {}
    type: object
  models.ActionRequest:
    properties:
      data:
        additionalProperties: true
        type: object
      key:
        maxLength: 100
        minLength: 1
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - key
    - name
    type: object
  models.AutomationRequest:
    type: object
  models.CreateGeofenceRequest:
    properties:
      color:
        type: string
      definition:
        type: object
      features:
        description: GeoJSON features
        items:
          type: object
        type: array
      is_active:
        example: true
        type: boolean
      name:
        maxLength: 100
        minLength: 1
        type: string
      space_id:
        type: string
      type_zone:
        description: '"type_zone" from frontend'
        enum:
        - safe
        - danger
        - normal
        type: string
    required:
    - color
    - features
    - name
    - type_zone
    type: object
  models.CreateGeofenceResponse:
    properties:
      geofence:
        $ref: '#/definitions/models.GeofenceResponse'
      message:
        type: string
    type: object
  models.DeleteGeofenceResponse:
    properties:
      message:
        type: string
    type: object
  models.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  models.EventRuleInfo:
    properties:
      created_at:
        type: string
      definition:
        type: object
      event_rule_id:
        type: string
      is_active:
        type: boolean
      rule_key:
        type: string
    type: object
  models.GeofenceResponse:
    properties:
      color:
        type: string
      created_at:
        type: string
      event_rule:
        $ref: '#/definitions/models.EventRuleInfo'
      features:
        items:
          type: object
        type: array
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      space_id:
        type: string
      type_zone:
        type: string
      updated_at:
        type: string
    type: object
  models.UpdateGeofenceRequest:
    properties:
      color:
        type: string
      definition:
        type: object
      features:
        items:
          type: object
        type: array
      is_active:
        type: boolean
      name:
        example: Updated Area Name
        maxLength: 100
        minLength: 1
        type: string
      space_id:
        type: string
      type_zone:
        enum:
        - safe
        - danger
        - normal
        type: string
    required:
    - features
    type: object
  models.UpdateGeofenceResponse:
    properties:
      geofence:
        $ref: '#/definitions/models.GeofenceResponse'
      message:
        type: string
    type: object
info:
  contact: {}
  description: API for telemetry service
  title: Telemetry API
  version: "1.0"
paths:
  /telemetry/v1/actions:
    get:
      consumes:
      - application/json
      description: Retrieve actions with optional search. Organization is resolved
        from X-Organization header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Search by name or key
        in: query
        name: search
        type: string
      - description: Number of results per page (default 20)
        in: query
        name: limit
        type: integer
      - description: Number of results to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.PaginatedResponse'
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get actions
      tags:
      - automations
    post:
      consumes:
      - application/json
      description: Create a new action. Organization is resolved from X-Organization
        header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Action configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ActionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create action
      tags:
      - automations
  /telemetry/v1/actions/{action_id}:
    delete:
      consumes:
      - application/json
      description: Delete an action by ID. Organization is resolved from X-Organization
        header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Action ID
        in: path
        name: action_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Action not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete action
      tags:
      - automations
    put:
      consumes:
      - application/json
      description: Update an existing action by ID. Organization is resolved from
        X-Organization header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Action ID
        in: path
        name: action_id
        required: true
        type: string
      - description: Action configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ActionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Action not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update action
      tags:
      - automations
  /telemetry/v1/alerts:
    get:
      consumes:
      - application/json
      description: Retrieve alerts based on configurable thresholds for a specific
        device. Organization is resolved from X-Organization header or hostname (e.g.,
        {org}.localhost)
      parameters:
      - description: Device ID
        in: query
        name: device_id
        required: true
        type: string
      - description: Alert category (e.g., water_level)
        in: query
        name: category
        required: true
        type: string
      - description: Start date (YYYY-MM-DD format)
        in: query
        name: start_date
        required: true
        type: string
      - description: End date (YYYY-MM-DD format)
        in: query
        name: end_date
        required: true
        type: string
      - description: Caution threshold value
        in: query
        name: caution_threshold
        type: number
      - description: Warning threshold value
        in: query
        name: warning_threshold
        type: number
      - description: Critical threshold value
        in: query
        name: critical_threshold
        type: number
      - description: Number of results per page (default 20)
        in: query
        name: limit
        type: integer
      - description: Number of results to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.PaginatedResponse'
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get alerts
      tags:
      - alerts
  /telemetry/v1/automations:
    get:
      consumes:
      - application/json
      description: Retrieve automations with optional filtering by device_id, space_slug,
        and search. Organization is resolved from X-Organization header or hostname
        (e.g., {org}.localhost)
      parameters:
      - description: Filter by device ID
        in: query
        name: device_id
        type: string
      - description: Filter by space ID
        in: query
        name: space_id
        type: string
      - description: Search by name or device ID
        in: query
        name: search
        type: string
      - description: Number of results per page (default 20)
        in: query
        name: limit
        type: integer
      - description: Number of results to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.PaginatedResponse'
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get automations
      tags:
      - automations
    post:
      consumes:
      - application/json
      description: Create a new automation. Organization is resolved from X-Organization
        header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Automation configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AutomationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create automation
      tags:
      - automations
  /telemetry/v1/automations/{automation_id}:
    delete:
      consumes:
      - application/json
      description: Delete an automation by ID. Organization is resolved from X-Organization
        header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Automation ID
        in: path
        name: automation_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Automation not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete automation
      tags:
      - automations
    get:
      consumes:
      - application/json
      description: Retrieve a single automation by ID. Organization is resolved from
        X-Organization header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Automation ID
        in: path
        name: automation_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Automation not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get automation by ID
      tags:
      - automations
    put:
      consumes:
      - application/json
      description: Update an existing automation by ID. Organization is resolved from
        X-Organization header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Automation ID
        in: path
        name: automation_id
        required: true
        type: string
      - description: Automation configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AutomationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Automation not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update automation
      tags:
      - automations
  /telemetry/v1/data/latest:
    get:
      consumes:
      - application/json
      description: Retrieve the latest properties/attributes for a specific device
        in a space. Organization is resolved from X-Organization header or hostname
        (e.g., {org}.localhost)
      parameters:
      - description: Device ID
        in: query
        name: device_id
        required: true
        type: string
      - description: Space slug
        in: query
        name: space_slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Device properties as key-value pairs
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get device properties
      tags:
      - data
  /telemetry/v1/devices/{device_id}/automations:
    get:
      consumes:
      - application/json
      description: Retrieve all automations for a specific device. Organization is
        resolved from X-Organization header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Device ID
        in: path
        name: device_id
        required: true
        type: string
      - description: Number of results per page (default 20)
        in: query
        name: limit
        type: integer
      - description: Number of results to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.PaginatedResponse'
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get automations by device
      tags:
      - automations
  /telemetry/v1/entities:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of entities with optional filtering.
        Organization is resolved from X-Organization header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Filter by entity category
        in: query
        name: category
        type: string
      - description: Filter by device ID
        in: query
        name: device_id
        type: string
      - description: Filter by display type (comma-separated)
        in: query
        name: display_type
        type: string
      - description: Search term for filtering
        in: query
        name: search
        type: string
      - description: Number of results per page (default 20)
        in: query
        name: limit
        type: integer
      - description: Number of results to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.PaginatedResponse'
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get entities
      tags:
      - entities
  /telemetry/v1/events/device/{device_id}:
    get:
      consumes:
      - application/json
      description: Retrieve events for a specific device with pagination and optional
        time range filtering. Organization is resolved from X-Organization header
        or hostname (e.g., {org}.localhost)
      parameters:
      - description: Device ID
        in: path
        name: device_id
        required: true
        type: string
      - description: Number of results per page (default 20)
        in: query
        name: limit
        type: integer
      - description: Number of results to skip (default 0)
        in: query
        name: offset
        type: integer
      - description: Start time as Unix timestamp (milliseconds)
        format: int64
        in: query
        name: start_time
        type: integer
      - description: End time as Unix timestamp (milliseconds)
        format: int64
        in: query
        name: end_time
        type: integer
      - description: Filter by title (case-insensitive partial match)
        in: query
        name: title
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.PaginatedResponse'
        "400":
          description: Invalid request parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get events by device
      tags:
      - events
  /telemetry/v1/geofences:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of geofences with optional filtering
        by space and active status. Organization is resolved from X-Organization header
        or hostname (e.g., {org}.localhost)
      parameters:
      - description: Filter by active status
        in: query
        name: is_active
        type: boolean
      - description: Number of results per page (default 20)
        in: query
        name: limit
        type: integer
      - description: Number of results to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.PaginatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get geofences
      tags:
      - geofences
    post:
      consumes:
      - application/json
      description: Create a new geofence with polygon geometry for a space. Organization
        is resolved from X-Organization header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Geofence configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateGeofenceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.CreateGeofenceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Create geofence
      tags:
      - geofences
  /telemetry/v1/geofences/{geofence_id}:
    delete:
      consumes:
      - application/json
      description: Delete a geofence by ID. Organization is resolved from X-Organization
        header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Geofence UUID
        in: path
        name: geofence_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DeleteGeofenceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Delete geofence
      tags:
      - geofences
    get:
      consumes:
      - application/json
      description: Retrieve a single geofence by its UUID. Organization is resolved
        from X-Organization header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Geofence UUID
        in: path
        name: geofence_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GeofenceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get geofence by ID
      tags:
      - geofences
    put:
      consumes:
      - application/json
      description: Update an existing geofence by ID. Organization is resolved from
        X-Organization header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Geofence UUID
        in: path
        name: geofence_id
        required: true
        type: string
      - description: Geofence updates
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateGeofenceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UpdateGeofenceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Update geofence
      tags:
      - geofences
  /telemetry/v1/location/history:
    get:
      consumes:
      - application/json
      description: Retrieve paginated historical location data for a specific device
        within a space. Organization is resolved from X-Organization header or hostname
        (e.g., {org}.localhost)
      parameters:
      - description: Device ID
        in: query
        name: device_id
        required: true
        type: string
      - description: Space slug
        in: query
        name: space_slug
        required: true
        type: string
      - description: Start time (RFC3339 format)
        in: query
        name: start
        required: true
        type: string
      - description: End time (RFC3339 format, defaults to now)
        in: query
        name: end
        type: string
      - description: Number of results per page (default 100)
        in: query
        name: limit
        type: integer
      - description: Number of results to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.PaginatedResponse'
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get device location history
      tags:
      - location
  /telemetry/v1/widget/data/{entity_id}:
    get:
      consumes:
      - application/json
      description: Retrieve data for dashboard widgets based on display type (gauge,
        switch, chart, histogram, table, map, slider, value). Organization is resolved
        from X-Organization header or hostname (e.g., {org}.localhost)
      parameters:
      - description: Entity ID
        in: path
        name: entity_id
        required: true
        type: string
      - description: Display type (gauge, switch, chart, histogram, table, map, slider,
          value)
        in: query
        name: display_type
        required: true
        type: string
      - description: Start time (RFC3339 format, required for chart, histogram, table)
        in: query
        name: start_time
        type: string
      - description: End time (RFC3339 format, required for chart, histogram, table)
        in: query
        name: end_time
        type: string
      - description: Aggregation method (mean, min, max, sum, count)
        in: query
        name: aggregation
        type: string
      - description: Time interval for grouping (e.g., 1m, 5m, 1h, 1d)
        in: query
        name: interval
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Widget data based on display type
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/models.ErrorResponse'
