processors:
  - category: water_level
    value_key: water_level
    unit: cm
    state_predicate: "s.state ~ '^-?[0-9]+(\\\\.[0-9]+)?$'"
    default_warning: 50
    default_critical: 200
    messages:
      critical: "Critical flood risk detected. Water level at %.0f cm"
      warning: "Water is rising quickly. Current level: %.0f cm"
      normal: "Water level monitoring: %.0f cm"
