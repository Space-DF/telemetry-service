processors:
  - category: water_depth
    value_key: water_depth
    unit: cm
    state_predicate: "s.state ~ '^-?[0-9]+(\\\\.[0-9]+)?$'"
    default_warning: 25
    default_critical: 200
    messages:
      critical: "Flood risk"
      warning: "Water is rising quickly"
      normal: "Water level monitoring: %.0f cm"
