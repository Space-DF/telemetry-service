# RAK4630 Event Rules
brand: "rakwireless"
model: "rak4630"
model_id: "" # Will be resolved from device service
display_name: "RAK4630 Event Rules"

rules:
  # Battery Low Warning
  - rule_key: "battery"
    operator: "lt"
    operand: "3.3"
    event_type: "device_event"
    event_level: "system"
    description: "Battery voltage is low (< 3.3V)"
    repeat_able: true
    is_active: true

  # Battery Critical Warning
  - rule_key: "battery"
    operator: "lt"
    operand: "3.0"
    event_type: "device_event"
    event_level: "system"
    description: "Battery voltage is critically low (< 3.0V)"
    repeat_able: true
    is_active: true

  # High Temperature Warning
  - rule_key: "temperature"
    operator: "gt"
    operand: "50"
    event_type: "device_event"
    event_level: "system"
    description: "Temperature is high (> 50°C)"
    repeat_able: true
    is_active: true

  # Low Temperature Warning
  - rule_key: "temperature"
    operator: "lt"
    operand: "-10"
    event_type: "device_event"
    event_level: "system"
    description: "Temperature is very low (< -10°C)"
    repeat_able: true
    is_active: true

  # High Humidity Warning
  - rule_key: "humidity"
    operator: "gt"
    operand: "90"
    event_type: "device_event"
    event_level: "system"
    description: "Humidity is very high (> 90%)"
    repeat_able: true
    is_active: true

  # Low Humidity Warning
  - rule_key: "humidity"
    operator: "lt"
    operand: "10"
    event_type: "device_event"
    event_level: "system"
    description: "Humidity is very low (< 10%)"
    repeat_able: true
    is_active: true
